yellow = "0xd19a66"

[colors.normal]
black = "0x1e2127"
blue = "0x61afef"
cyan = "0x56b6c2"
green = "0x98c379"
magenta = "0xc678dd"
red = "0xe06c75"
white = "0x828791"
yellow = "0xd19a66"

[colors.primary]
background = "0x1e2127"
bright_foreground = "0xe6efff"
foreground = "0xabb2bf"

[env]
TERM = "alacritty"

[font]
size = 14.0

[font.bold]
family = "HackGen35 Console NF"
style = "Bold"

[font.normal]
family = "HackGen35 Console NF"
style = "Regular"

[font.offset]
x = -1
y = -1

[[keyboard.bindings]]
action = "Paste"
key = "V"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "Copy"
key = "C"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ResetFontSize"
key = "Key0"
mods = "Control"

[[keyboard.bindings]]
action = "IncreaseFontSize"
key = "Equals"
mods = "Control"

[[keyboard.bindings]]
action = "DecreaseFontSize"
key = "Minus"
mods = "Control"

[[keyboard.bindings]]
action = "ToggleFullscreen"
key = "F11"

[[keyboard.bindings]]
action = "CreateNewWindow"
key = "N"
mods = "Control|Shift"

[[keyboard.bindings]]
# Claude Code 等の改行 (ESC + CR)。Windows では Alt+Enter が既定でフルスクリーン
# 切替に取られるため明示バインドで上書きし、Linux と同一挙動にする
# Newline (ESC + CR) for Claude Code etc. Windows binds Alt+Enter to fullscreen
# by default, so override it explicitly to match Linux behavior
chars = "\u001b\r"
key = "Enter"
mods = "Alt"

[terminal.shell]
# herdr は既存セッションへ自動アタッチするため attach || new の分岐は不要
# herdr auto-attaches to an existing session, no attach-or-new branching needed
args = ["--login", "--command", "herdr"]
program = "/usr/bin/fish"

[window]
opacity = 0.8
title = "Alacritty"

[window.class]
general = "Alacritty"
instance = "Alacritty"

[general]
live_config_reload = true

[terminal]
