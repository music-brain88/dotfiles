# ウィンドウルール設定
# Hyprland v0.53+ 新構文
# インライン形式: windowrule = match:<条件> <値>, <ルール> <値>
# ブロック形式: windowrule { name = <名前> \n match:<条件> = <値> \n <ルール> = <値> }
# 注意: ブロック構文では name が最初のキーとして必須（Hyprlang の special category 仕様）

# ─── ワークスペース割り当て ───────────────────────────
# 3層構造の設計思想 / Three-layer workspace design:
#   作業台 (ws1〜3) / Workbench: タスクごとに自由に構成する場所。参照用ブラウザやエディタを
#   意図せず連れ去らないよう、固定の windowrule を意図的に置いていない。
#     Freely arranged per task. No fixed windowrule is placed here on purpose, so opening
#     a browser/editor for reference never gets silently yanked to another workspace.
#   詰め所 (ws4〜) / Depot: 通知型で常駐させたいアプリを Go 型（明示的に固定ワークスペースへ
#   送る）でここに集約する。
#     Notification-driven apps that should live in the background are gathered here with
#     a "Go" style rule (explicitly pinned to a fixed workspace).
#   引き出し (special workspaces) / Drawer: 参照アプリを Bring 型（呼び出した時だけ手元に
#   出すオーバーレイ）で扱う層。Super+O / Super+A でどこからでもトグル表示できる（#345）。
#     Reference apps handled as a "Bring" style overlay (summoned only on demand via special
#     workspaces), toggled from anywhere with Super+O / Super+A (#345).
windowrule = match:class ^(slack)$, workspace 4 silent
windowrule = match:class ^(discord)$, workspace 4 silent
windowrule = match:class ^(spotify)$, workspace 5 silent

# 引き出し: 起動時に named special workspace へ直行させる（Super+O / Super+A でトグル）
# Drawer: send these reference apps straight to their named special workspace on launch
# （class 名は実機の hyprctl clients -j で確認済み / class names verified live via hyprctl clients -j）
windowrule = match:class ^(obsidian)$, workspace special:obsidian silent
windowrule = match:class ^(claude-desktop)$, workspace special:claude silent

# ─── システムユーティリティ（フロート + サイズ + 配置） ──
windowrule {
  name = pavucontrol
  match:class = ^(pavucontrol)$
  float = on
  size = 800 600
  center = on
  animation = slide up
}

windowrule {
  name = blueman-manager
  match:class = ^(blueman-manager)$
  float = on
  size = 800 600
  center = on
  animation = slide down
}

windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(vlc)$, float on
windowrule = match:class ^(org.kde.polkit-kde-authentication-agent-1)$, float on
windowrule = match:class ^(file-roller)$, float on

# ─── 透明度設定 ─────────────────────────────────────
windowrule = match:class ^(kitty)$, opacity 0.9 0.9
windowrule = match:class ^(code)$, opacity 0.95 0.95
windowrule = match:class ^(firefox)$, opacity 0.95 0.95
windowrule = match:class ^(slack)$, opacity 0.9 0.9
windowrule = match:class ^(spotify)$, opacity 0.9 0.9
windowrule = match:class ^(Emacs)$, opacity 0.95 0.95
windowrule = match:class ^(neovide)$, opacity 0.95 0.95
# WezTerm が native Arch のメインターミナル（Phase 3, #393）。Alacritty ルールは併存期間中のフォールバックとして残す
windowrule = match:class ^(org.wezfurlong.wezterm)$, opacity 0.9 0.9
# NOTE: Alacritty のクラス名は大文字始まり（正規表現は大文字小文字を区別する）
windowrule = match:class ^(Alacritty)$, opacity 0.9 0.9

# 透過を無効にする（完全に不透明にする）
windowrule = match:class ^(Vivaldi-stable)$, opaque on

# ─── アニメーション ─────────────────────────────────
windowrule = match:class ^(wofi)$, animation slide left

# ─── フォーカス制御 ─────────────────────────────────
windowrule = match:class ^(steam_app)$, immediate on
windowrule = match:class ^(steam_app)$, match:title ^(Steam Input Keyboard)$, no_focus on
windowrule = match:class ^(Vivaldi-stable)$, immediate on
windowrule = match:class ^(Vivaldi-stable)$, match:title ^()$, no_focus on

# ─── ダイアログとポップアップ ───────────────────────
windowrule = match:title ^(Open File)$, float on
windowrule = match:title ^(Save File)$, float on
windowrule = match:title ^(Save As)$, float on
windowrule = match:title ^(File Upload)$, float on
windowrule = match:title ^(File Download)$, float on
windowrule = match:title ^(Confirm to replace files)$, float on
windowrule = match:title ^(Warning)$, float on
windowrule = match:title ^(Error)$, float on

# ─── ゲーム関連 ─────────────────────────────────────
windowrule = match:class ^(steam_app).*, fullscreen on
windowrule = match:class ^(steam_app).*, workspace 6 silent
windowrule = match:class ^(lutris)$, workspace 6 silent

# ─── その他のアプリケーション ───────────────────────
windowrule = match:class ^(mpv)$, float on
windowrule = match:class ^(imv)$, float on
windowrule = match:class ^(nwg-look)$, float on
windowrule = match:class ^(qt5ct)$, float on
windowrule = match:class ^(eog)$, float on
windowrule = match:class ^(Spotify)$, tile on

# ─── XWaylandアプリケーション ───────────────────────
windowrule = match:xwayland = true, rounding 0
windowrule = match:xwayland = true, opacity 0.95 0.95

# ─── ピクチャーインピクチャーモード ─────────────────
windowrule {
  name = picture-in-picture
  match:title = ^(Picture-in-Picture|Picture in picture)$
  pin = on
  float = on
  size = 500 280
  move = 75% 75%
}
