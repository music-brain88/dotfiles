###################
### キーバインド ###
###################

# メインのモディファイヤーキーをSuperキー（Windowsキー）に設定
$mainMod = SUPER

### システム管理 ###
# パッケージ管理
bind = $mainMod SHIFT, P, exec, alacritty -e paru
# 通知制御
bind = $mainMod, N, exec, ~/.config/hypr/scripts/notifications.sh toggle
bind = $mainMod SHIFT, N, exec, ~/.config/hypr/scripts/notifications.sh clear
# システムモニタリング
# bind = $mainMod, M, exec, alacritty -e btm

### アプリケーションの起動 ###
# ターミナル（Alacritty）
bind = $mainMod, RETURN, exec, alacritty
# ブラウザ（Vivaldi）
bind = $mainMod, I, exec, vivaldi-stable
# ファイルマネージャー（Nautilus）
bind = $mainMod, E, exec, nautilus
# アプリケーションランチャー（Wofi）
bind = $mainMod, D, exec, wofi --show drun
# スクリーンロック（Hyprlock）
bind = $mainMod, L, exec, hyprlock
# ログアウトメニュー（Wlogout）
bind = $mainMod, M, exec, wlogout

### ウィンドウ管理 ###
# アクティブウィンドウを終了
bind = ALT, F4, killactive
# Hyprlandを終了
# bind = $mainMod SHIFT, M, exit
# フローティングモードの切り替え
bind = $mainMod, V, togglefloating
# 疑似タイリングモードの切り替え
bind = $mainMod, P, pseudo
# タイリングの分割方向を切り替え
bind = $mainMod, J, togglesplit

### フォーカス移動 ###
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

### ウィンドウの移動 ###
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

### Alt+Tabでウィンドウを切り替え
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,
#### Alt+Shift+Tabで逆順に切り替え
bind = ALT SHIFT, Tab, cyclenext, prev
bind = ALT SHIFT, Tab, bringactivetotop,

# オプション: アニメーション設定
animations {
    enabled = true
    # ウィンドウ切り替え時のアニメーション
    animation = windows, 1, 3, default
    animation = windowsIn, 1, 3, default, popin
    animation = windowsOut, 1, 3, default, popin
}

# オプション: ウィンドウスイッチャーの見た目を調整
misc {
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}


### ワークスペース操作 ###
# ワークスペースへの移動
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# ウィンドウをワークスペースに移動
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# ワークスペース間の移動
bind = SUPER CTRL, left, workspace, e-1  # 左の workspace に移動
bind = SUPER CTRL, right, workspace, e+1 # 右の workspace に移動
#bind = SUPER CTRL, up, workspace, -1     # 上の workspace に移動
#bind = SUPER CTRL, down, workspace, +1    # 下の workspace に移動

# アクティブウィンドウを指定のワークスペースに移動（オプション）
bind = SUPER CTRL SHIFT, left, movetoworkspace, e-1  # ウィンドウを左のワークスペースに移動
bind = SUPER CTRL SHIFT, right, movetoworkspace, e+1 # ウィンドウを右のワークスペースに移動
#bind = SUPER CTRL SHIFT, up, movetoworkspace, -1     # ウィンドウを上のワークスペースに移動
#bind = SUPER CTRL SHIFT, down, movetoworkspace, +1    # ウィンドウを下のワークスペースに移動

# オプション: アニメーション設定
animations {
    enabled = true
    # ワークスペース切り替え時のアニメーション
    animation = workspaces, 1, 3, default, slidevert
}

### システム操作 ###
# スクリーンショット（選択領域をクリップボードにコピー）
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
# スクリーンショット（選択領域を画像として保存）
bind = SHIFT, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +'%Y%m%d_%H%M%S').png

### メディアコントロール ###
# 音量調整
bind = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# 画面の明るさ調整
bind = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
