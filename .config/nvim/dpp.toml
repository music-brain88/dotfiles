# NOTE: denops.vim is no longer declared as a plugin entry here.
# It is Nix-managed (PR-1, #476) and added to 'runtimepath' directly by
# init.lua's bootstrap via $NVIM_DENOPS_VIM, so dpp-ext-installer must not
# treat it as a clone target (see #472 D6 discussion, "denops.vim entry").
# denops.vim はここではプラグインとして宣言しない。PR-1(#476)でNix管理化され
# init.luaのbootstrapが$NVIM_DENOPS_VIM経由で直接runtimepathへ追加するため、
# dpp-ext-installerのclone対象にしてはいけない(#472 D6「denops.vimエントリ」参照)。

[[plugins]]
repo = 'Shougo/pum.vim'

[[plugins]]
repo = 'wakatime/vim-wakatime'
hook_add = '''
if has('nvim') && isdirectory( $PYENV_ROOT.'/versions/neovim3' )
  let g:wakatime_PythonBinary = $PYENV_ROOT.'/versions/neovim3/bin/python'
endif
'''

# 自動括弧閉じ
[[plugins]]
repo = 'cohama/lexima.vim'
hook_add = '''
  "call lexima#add_rule({'at': '\%#.*[-0-9a-zA-Z_,:]', 'char': '{', 'input': '{'})
  "call lexima#add_rule({'at': '\%#\n\s*}', 'char': '}', 'input': '}', 'delete': '}'})
'''

# 画面分割機能強化
[[plugins]]
repo = 'simeji/winresizer'

# toml syntax
[[plugins]] 
repo = 'cespare/vim-toml'
on_ft = 'toml'

[[plugins]] # カーソル位置のコンテキストに合わせてftを切り替える
repo = 'osyo-manga/vim-precious'
depends = ['context_filetype.vim']

[[plugins]] # カーソル位置のコンテキストのftを判定するライブラリ
repo = 'Shougo/context_filetype.vim'

# terminal plugin
# NOTE: 'if = "has(\'nvim\')"' removed (D6) — this config targets Neovim only,
# so the condition was always true. Purely declarative TOML per #472.
# 'if' キーは削除(D6) — このconfigはNeovim専用構成のため常にtrueだった。
# #472 に合わせて宣言的なTOMLへ。
[[plugins]]
repo = 'kassio/neoterm'
hook_add = '''
nnoremap <silent> ,rc :TREPLSendFile<cr>
nnoremap <silent> ,rl :TREPLSendLine<cr>
vnoremap <silent> ,rl :TREPLSendSelection<cr>
nnoremap <silent> vt :Ttoggle<cr>
nnoremap <silent> vs :terminal<cr>
'''


# フロントエンド周り
[[plugins]]
repo = 'norcalli/nvim-colorizer.lua'
on_event = 'BufEnter'
hook_source = '''
lua << EOF
  require'colorizer'.setup()
EOF
'''
# フロントエンド周り

[[plugins]]
repo = 'nvim-lua/plenary.nvim'
