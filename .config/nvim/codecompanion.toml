      .. "1. ユニットテストのケース\n"
      .. "2. エッジケースの考慮\n"
      .. "3. 統合テストのシナリオ\n"
      .. "4. モックやスタブの使用方法\n"
      .. "5. テストカバレッジの目標",
  }),
  ["Refactor Code"] = make_task_prompt({
