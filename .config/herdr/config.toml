# herdr configuration — tmux から移行 (keybind は旧 tmux.conf を踏襲)
# Migrated from tmux; keybindings follow the previous tmux.conf.
#
# 以下は herdr デフォルトのまま使用 (旧 tmux 設定と一致 or 標準採用):
# The following stay on herdr defaults (already matching tmux, or adopted as-is):
#   focus_pane_*     = prefix+h/j/k/l   (tmux と同じ / same as tmux)
#   split_horizontal = prefix+minus     (tmux と同じ / same as tmux)
#   copy_mode        = prefix+[  (vi 風 v/y / vi-style v and y)
#   resize_mode      = prefix+r  (モード内 h/j/k/l でリサイズ / resize with h/j/k/l)
#   reload_config    = prefix+shift+r

[terminal]
default_shell = "fish"

[ui]
# 移行前にローカルで設定済みだった値を引き継ぎ / carried over from the pre-migration local config
agent_panel_sort = "spaces"

[keys]
prefix = "ctrl+g"                             # tmux: set-option -g prefix C-g
split_vertical = ["prefix+v", "prefix+|"]     # tmux: bind | split-window -h
next_tab = ["prefix+n", "prefix+ctrl+l"]      # tmux: bind -r C-l select-window -t :+
previous_tab = ["prefix+p", "prefix+ctrl+h"]  # tmux: bind -r C-h select-window -t :-
new_tab = "prefix+c"                          # 同プロジェクトの別作業タブ / another work tab in the same project (tmux: new-window 相当)
new_workspace = "prefix+shift+c"              # 別プロジェクト用ワークスペース / workspace for another project (小文字tab/大文字workspaceの対称 / lowercase tab, uppercase workspace)
zoom = "prefix+z"                             # ペイン全画面 / fullscreen the pane (画面が狭い時の分離代わり / substitute for splitting on a narrow screen)
open_notification_target = "prefix+o"         # 通知を上げたペインへジャンプ / jump to the pane that raised a notification
switch_workspace = "prefix+shift+1..9"        # 番号でワークスペースへ直行 / jump straight to a workspace by number (indexed)
next_agent = "prefix+}"                       # 次のエージェントペインへ(巡回) / cycle to the next agent pane (shift+])
previous_agent = "prefix+{"                   # 前のエージェントペインへ(巡回) / cycle to the previous agent pane (shift+[; prefix+[ は copy_mode 温存のため回避 / avoid prefix+[ to keep copy_mode)
