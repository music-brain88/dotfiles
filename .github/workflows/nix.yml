name: Nix CI

# NOTE: トリガーに paths-ignore を使わない — required status checks と両立させるため。
# トリガー段階で workflow を止めるとチェックが一切報告されず、PR が
# 「Expected — waiting for status」のままマージ不能になる (#312)。
# 代わりに changes ジョブで変更を判定し、対象外なら各ジョブを skip する
# (skip されたジョブは required checks 上は成功扱いになる)。
# Do NOT use paths-ignore on triggers: it breaks required status checks (#312).
# The changes job detects what changed and downstream jobs skip themselves;
# skipped jobs satisfy required checks.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # 変更ファイルを判定して下流ジョブの実行要否を決める
  # Detect changed files to decide whether the heavy jobs need to run
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect non-docs changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          # base が取れない場合 (force push / ブランチ新規作成等) は安全側に倒して実行する
          # If the base SHA is unavailable, fail open and run everything
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base" 2>/dev/null; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "base unavailable -> code=true"
            exit 0
          fi
          # docs/llm/md/LICENSE/.gitignore 以外に変更があれば code=true
          # (旧 paths-ignore と同じ除外セット)
          if git diff --name-only "$base" HEAD | grep -vE '(\.md$|^docs/|^llm/|^LICENSE$|^\.gitignore$)' | grep -q .; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  # Build Docker image with Nix pre-installed
  build-image:
    name: Build Docker Image
    needs: changes
    if: needs.changes.outputs.code == 'true'
    uses: ./.github/workflows/build-docker-image.yml
    permissions:
      contents: read
      packages: write

  # Check flake and formatting (lightweight, no container needed)
  check:
    name: Nix Check & Format
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # shellcheck は ubuntu-latest にプリインストール済み
      # shellcheck is preinstalled on ubuntu-latest runners
      - name: Shellcheck
        run: |
          git ls-files '*.sh' | xargs --no-run-if-empty shellcheck

      # SHA pin: supply-chain 対策で mutable な @main を使わない (コメントは対応する tag)
      # SHA-pinned to avoid mutable @main refs; trailing comment shows the tag
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14
        with:
          use-flakehub: false

      - name: Check flake
        run: nix flake check --no-build

      - name: Check format
        run: |
          nix develop --command nixpkgs-fmt --check flake.nix home.nix nix/

  # Build in Arch Linux container with Docker layer cache
  # This preserves the Arch Linux environment for testing
  # Note: We manually pull/run Docker instead of using `container:` section
  # because `container:` pulls the image BEFORE any steps run,
  # which prevents disk cleanup from running first.
  #
  # Cache Strategy:
  # - Cache /nix/store for build artifacts (speeds up builds significantly)
  # - Always install Nix fresh to ensure profiles are created correctly
  # - Remove receipt.json before install to force fresh installation
  # Note: magic-nix-cache doesn't work well with Docker containers because
  # it subscribes to Nix daemon events on the host, not inside containers
  verify-docker:
    name: Build & Verify (Arch Linux)
    runs-on: ubuntu-latest
    needs: [changes, build-image, check]
    if: needs.changes.outputs.code == 'true'
    # cache-nix-action の purge (キャッシュ削除 API 呼び出し) には actions: write が要る。
    # 明示すると他スコープは既定で none になるため、既存の checkout / ghcr pull に
    # 必要な権限も合わせて列挙する (#368)。
    # cache-nix-action's purge (a cache-delete API call) needs actions: write.
    # Declaring `permissions:` resets every other scope to none, so we must
    # also list what checkout / the ghcr pull already relied on (#368).
    permissions:
      contents: read
      packages: read
      actions: write
    steps:
      # Free up disk space BEFORE pulling the large Docker image
      - name: Free disk space
        run: |
          echo "=== Disk space before cleanup ==="
          df -h
          echo "=== Removing unnecessary tools ==="
          sudo rm -rf /usr/share/dotnet      # ~6GB
          sudo rm -rf /usr/local/lib/android # ~10GB
          sudo rm -rf /opt/ghc               # ~5GB
          sudo rm -rf /usr/share/swift       # ~1.5GB
          sudo rm -rf /usr/local/share/boost # ~1.5GB
          echo "=== Disk space after cleanup ==="
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      # Create /nix directory with proper permissions before cache restore
      # This is required because runner user cannot create /nix without sudo
      - name: Prepare Nix directory
        run: |
          sudo mkdir -p /nix
          sudo chown -R "$(whoami)":"$(whoami)" /nix

      # Restore Nix cache for /nix/store build artifacts
      # Note: nix: false is required because Nix is not installed yet
      #
      # 同じ primary-key で HIT した場合、cache-nix-action は post (保存) 側で
      # 保存自体をスキップする仕様がある。*.nix / flake.lock を変更しない限り
      # key は変わらないため、一度不完全な状態で保存されたキャッシュがそのまま
      # 凍結し続けていた (#368)。purge-primary-key: always で「同じ key の古い
      # キャッシュ」を Post Restore フェーズ (= このジョブの全ステップ完了後) で
      # 必ず削除させ、直後の save 判定を「primary-key に一致するキャッシュなし」
      # の状態にして、実行のたびに最新の /nix store 内容で保存し直させる。
      # 削除には actions: write 権限が要る (ジョブ側 permissions で付与済み)。
      #
      # When there's a primary-key hit, cache-nix-action skips saving in its
      # post (save) phase. Since the key only changes when *.nix/flake.lock
      # change, a cache saved once in an incomplete state stayed frozen
      # forever (#368). purge-primary-key: always forces the action to purge
      # the existing same-key cache during the Post Restore phase (after all
      # of this job's steps finish), so the subsequent save check always
      # sees "no cache matching primary-key" and re-saves with this run's
      # current /nix store contents. Purging needs actions: write (granted
      # via the job-level `permissions` above).
      - name: Restore Nix cache
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-docker-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-docker-${{ runner.os }}-
          paths: |
            /nix
            ~/.cache/nix
          nix: false
          purge: true
          purge-primary-key: always

      # Fix /nix ownership and remove installer artifacts for fresh installation
      # - Restore root ownership (cache restores as runner user)
      # - Remove receipt.json to force nix-installer to run fresh
      # - This preserves /nix/store cache while ensuring proper setup
      - name: Prepare for fresh Nix install
        run: |
          sudo chown -R root:root /nix
          sudo rm -f /nix/receipt.json /nix/nix-installer

      # Always install Nix to ensure profiles are created correctly
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image
        run: docker pull ghcr.io/${{ github.repository }}/dotfiles-env:latest

      # Build and verify inside container with host's Nix store mounted
      # Runs as archie user to match Home Manager configuration
      # Executes activation to fully test the deployment process
      - name: Build and verify Home Manager configuration in container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "/nix:/nix" \
            -w /workspace \
            ghcr.io/${{ github.repository }}/dotfiles-env:latest \
            bash -c '
              git config --global --add safe.directory /workspace
              nix build .#homeConfigurations.archie.activationPackage
              echo "=== Verifying build output ==="
              ls -la ./result/
              echo "=== Running Home Manager activation ==="
              ./result/activate
              echo "=== Home Manager activation completed successfully ==="
            '

      # コンテナ内の nix build はホストの nix-daemon を経由しない
      # (Dockerfile が `--init none` でデーモン無しインストールしているため、
      # コンテナ側は /nix を直接叩くローカルストアとして nix を使う)。
      # 一方ホスト側では nix-installer-action が起動した nix-daemon が
      # 同じ db.sqlite をジョブの間ずっと開いたままにしている。SQLite の
      # WAL は「最後の接続が閉じたとき」に自動 checkpoint される仕様のため、
      # コンテナ側プロセスが終了しても「最後の接続」にならず、今回のビルドで
      # 新規登録された valid path が db.sqlite-wal に取り残ったままになりうる。
      # cache-nix-action は nix: false だとこの checkpoint 処理をしない
      # (restore/save 双方で db.sqlite の面倒を見るのは nix: true の場合のみ)
      # ため、保存前にここで明示的に checkpoint し、次回リストア時に
      # 「ビルド済みなのに未登録」(→ rustup 等の再ビルド) が起きないようにする。
      # rustup が cache.nixos.org にあるのに毎回ビルドされる件は、そもそも
      # flake.nix のオーバーレイ (doCheck = false) で本家と異なる派生物に
      # なっている分は解消されないが、それ以外の「本来キャッシュ可能なのに
      # 再ビルドされていた」分はこれで解消されるはず (#368、詳細はPR本文参照)。
      #
      # The containerized `nix build` never talks to the host's nix-daemon
      # (the Dockerfile installs Nix with `--init none`, so the container
      # uses /nix as a local store directly). Meanwhile the host's
      # nix-daemon (started by nix-installer-action) keeps its own
      # connection to the same db.sqlite open for the entire job. SQLite's
      # WAL is checkpointed automatically "when the last connection
      # closes" — since the container's exit is never the *last* one, new
      # valid-path registrations from this run's build can be stranded in
      # db.sqlite-wal and never reach db.sqlite. cache-nix-action only
      # handles this checkpoint/merge dance when `nix: true` (not our case,
      # see the Restore Nix cache step above), so we force a checkpoint
      # here before the cache is saved. This doesn't help the handful of
      # packages that are unavoidably rebuilt because flake.nix overlays
      # them away from the stock nixpkgs derivation (e.g. rustup's
      # `doCheck = false` override) — only the cache-nix-action install/
      # gc-max-store-size design change would touch that, and it's out of
      # scope here (see PR description for the full rustup investigation).
      - name: Checkpoint Nix store database before caching
        continue-on-error: true
        run: sudo sqlite3 /nix/var/nix/db/db.sqlite 'PRAGMA wal_checkpoint(TRUNCATE);'
