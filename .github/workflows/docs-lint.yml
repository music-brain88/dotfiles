name: Docs Lint

# NOTE: トリガーに paths を使わない — required status checks と両立させるため。
# トリガー段階で workflow を止めるとチェックが報告されず、コードのみの PR が
# 「Expected — waiting for status」のままマージ不能になる (#312)。
# Do NOT use paths triggers: it breaks required status checks (#312).
#
# NOTE: `Check Markdown Links` は ruleset の required status check なので、
# nix.yml の changes パターン (ジョブ自体を if で skip) はここでは使えない。
# skip されたジョブは「成功扱い」ではなく SKIPPED になり、ruleset はそれを
# 未達として扱うため、docs 非変更 PR が永久に「Expected — waiting for
# status」でマージ不能になる (#375)。そのため link-check ジョブ自体は毎回
# 必ず実行し、ジョブ内の Link Checker ステップだけを .md 変更の有無で
# skip する。ステップが無ければ他に失敗要因が無いのでジョブは success で
# 終わる。
# `Check Markdown Links` is a ruleset required status check, so it cannot
# use the nix.yml `changes` pattern of skipping the whole job via job-level
# `if`. A skipped job is reported as SKIPPED, not success, and rulesets
# treat SKIPPED as unmet — leaving docs-untouched PRs stuck on "Expected —
# waiting for status" forever (#375). So the link-check job itself always
# runs; only the Link Checker step inside it is conditioned on whether any
# markdown changed. With no failing step, the job reports success.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # .md の変更有無を判定する / Detect whether any markdown files changed
  changes:
    name: Detect Docs Changes
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect markdown changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
          fi
          # base が取れない場合 (force push / ブランチ新規作成等) は安全側に倒して実行する
          # If the base SHA is unavailable, fail open and run the check
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base" 2>/dev/null; then
            echo "docs=true" >> "$GITHUB_OUTPUT"
            echo "base unavailable -> docs=true"
            exit 0
          fi
          if git diff --name-only "$base" HEAD | grep -E '\.md$' | grep -q .; then
            echo "docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs=false" >> "$GITHUB_OUTPUT"
          fi

  link-check:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    needs: changes
    steps:
      - name: Checkout repository
        if: needs.changes.outputs.docs == 'true'
        uses: actions/checkout@v4

      # lychee validates that linked files/URLs resolve, but it does NOT
      # validate #anchor fragments against actual headings. Bilingual
      # headings in this repo (e.g. "## Quick Start / クイックスタート")
      # produce GitHub-slugified anchors that can shift when a heading
      # moves to a new file — anchor links must still be checked by hand.
      # nixos.org は DDoS 対策で GitHub ランナーの IP を遮断することがあり、
      # リンクが生きていても Connection failed になるため除外する。
      # nix.dev も同じ NixOS 財団系インフラのため同様の遮断が起きる
      # (実例: PR #411 で Connection reset by peer、リトライ5回でも回復せず)。
      # nixos.org intermittently blocks GitHub runner IPs (DDoS protection),
      # so valid links fail with "Connection failed" — exclude the domain.
      # nix.dev shares the same NixOS Foundation infra and hits the same
      # blocking (seen in PR #411: Connection reset by peer, unrecovered
      # after 5 retries) — exclude it too.
      #
      # --max-retries / --retry-wait-time: GitHub 側の一時的な 5xx を
      # リトライで吸収する (実例: run 28885785093、rerun 一発で pass — #375)。
      # --accept: デフォルト (100..=103,200..=299) に 500..=599 を追加し、
      # 「サーバーの一時不調」を fail 扱いしない。4xx (404 含む) は明示的に
      # accept していないので、リンク切れの検出力はそのまま維持される。
      # Retry transient GitHub 5xx errors (seen live in run 28885785093,
      # resolved by a single rerun — #375) and widen --accept to also treat
      # 500..=599 as non-fatal "server had a bad day" responses. 4xx (incl.
      # 404) is deliberately left out of --accept, so broken-link detection
      # is unaffected.
      - name: Link Checker
        if: needs.changes.outputs.docs == 'true'
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-path result
            --exclude '^https://nixos\.org'
            --exclude '^https://nix\.dev'
            --max-retries 5
            --retry-wait-time 5
            --accept '100..=103,200..=299,500..=599'
            '**/*.md'
          fail: true

      - name: No markdown changes
        if: needs.changes.outputs.docs != 'true'
        run: echo "No markdown files changed - skipping link check (job reports success)."
