name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
template: |
  ## 📦 v$RESOLVED_VERSION

  ## 🎉 What's New

  $CHANGES

  **Full Changelog:** https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: '🚀 Features'
    labels:
      - 'feat'
    collapse-after: 10
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
    collapse-after: 10
  - title: '⚡ Performance'
    labels:
      - 'perf'
    collapse-after: 5
  - title: '🔧 Refactoring'
    labels:
      - 'refactor'
    collapse-after: 5
  - title: '📚 Documentation'
    labels:
      - 'docs'
    collapse-after: 5
  - title: '🧪 Tests'
    labels:
      - 'test'
    collapse-after: 5
  - title: '🏗️ Build'
    labels:
      - 'build'
    collapse-after: 5
  - title: '🔨 CI/CD'
    labels:
      - 'ci'
    collapse-after: 5
  - title: '🎨 Styles'
    labels:
      - 'style'
    collapse-after: 5
  - title: '🧹 Chores'
    labels:
      - 'chore'
    collapse-after: 5
  - title: '⏪ Reverts'
    labels:
      - 'revert'
    collapse-after: 5

# Auto-label PRs based on title patterns (conventional commits)
autolabeler:
  - label: 'feat'
    title:
      - '/^feat(?:\([^)]+\))?!?:/i'
  - label: 'fix'
    title:
      - '/^fix(?:\([^)]+\))?!?:/i'
  - label: 'perf'
    title:
      - '/^perf(?:\([^)]+\))?!?:/i'
  - label: 'docs'
    title:
      - '/^docs(?:\([^)]+\))?!?:/i'
  - label: 'refactor'
    title:
      - '/^refactor(?:\([^)]+\))?!?:/i'
  - label: 'test'
    title:
      - '/^test(?:\([^)]+\))?!?:/i'
  - label: 'build'
    title:
      - '/^build(?:\([^)]+\))?!?:/i'
  - label: 'ci'
    title:
      - '/^ci(?:\([^)]+\))?!?:/i'
  - label: 'chore'
    title:
      - '/^chore(?:\([^)]+\))?!?:/i'
  - label: 'style'
    title:
      - '/^style(?:\([^)]+\))?!?:/i'
  - label: 'revert'
    title:
      - '/^revert(?:\([^)]+\))?!?:/i'
  - label: 'breaking'
    title:
      - '/^(?:feat|fix|perf|docs|refactor|test|build|ci|chore|style|revert)(?:\([^)]+\))?!:/i'

# Version resolver based on labels
version-resolver:
  major:
    labels:
      - 'breaking'
  minor:
    labels:
      - 'feat'
  patch:
    labels:
      - 'fix'
      - 'perf'
      - 'docs'
      - 'refactor'
      - 'test'
      - 'build'
      - 'ci'
      - 'chore'
      - 'style'
      - 'revert'
  default: patch

exclude-labels:
  - 'skip-changelog'
